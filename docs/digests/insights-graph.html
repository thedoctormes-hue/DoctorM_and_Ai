<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Граф знаний — 8 реальных тем</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, sans-serif;
  }
  main {
    max-width: 1100px;
    margin: 32px auto;
    padding: 0 20px;
  }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1.2; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.6; }
</style>
<main>
<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Граф знаний — 8 реальных тем</text>
  <text x="500" y="52" text-anchor="middle" class="small">После семантического дедупа: 235 → 8 тем. 225 инсайтов в session-mining не показаны.</text>

  <!-- Zone: Security -->
  <rect x="30" y="80" width="300" height="240" rx="12" class="zone risk"/>
  <text x="50" y="105" class="small" style="fill:#991b1b;font-weight:600;">🔴 БЕЗОПАСНОСТЬ</text>

  <!-- Security node -->
  <rect x="60" y="120" width="240" height="60" rx="8" class="node risk"/>
  <text x="180" y="145" text-anchor="middle" class="label">security-audit</text>
  <text x="180" y="165" text-anchor="middle" class="small">4 инсайта · 26 critical vulns</text>

  <!-- WireGuard -->
  <rect x="60" y="200" width="240" height="44" rx="6" class="node risk"/>
  <text x="180" y="220" text-anchor="middle" class="small">WireGuard ключ в открытом git</text>
  <text x="180" y="236" text-anchor="middle" class="small">🔴 КРИТИЧНО</text>

  <!-- 47 vulns -->
  <rect x="60" y="260" width="240" height="44" rx="6" class="node risk"/>
  <text x="180" y="280" text-anchor="middle" class="small">47 уязвимостей (26 high, 17 mod, 4 low)</text>
  <text x="180" y="296" text-anchor="middle" class="small">🔴 Требует закрытия</text>

  <!-- Zone: Architecture -->
  <rect x="360" y="80" width="280" height="240" rx="12" class="zone process"/>
  <text x="380" y="105" class="small" style="fill:#4338ca;font-weight:600;">🔵 АРХИТЕКТУРА</text>

  <!-- myrmex.json -->
  <rect x="380" y="120" width="240" height="50" rx="6" class="node process"/>
  <text x="500" y="142" text-anchor="middle" class="label">myrmex.json</text>
  <text x="500" y="160" text-anchor="middle" class="small">projects + agent_zones</text>

  <!-- openclaw.json -->
  <rect x="380" y="185" width="240" height="50" rx="6" class="node process"/>
  <text x="500" y="207" text-anchor="middle" class="label">openclaw.json</text>
  <text x="500" y="225" text-anchor="middle" class="small">Единственный источник реестра</text>

  <!-- git worktree -->
  <rect x="380" y="250" width="240" height="50" rx="6" class="node process"/>
  <text x="500" y="272" text-anchor="middle" class="label">git worktree</text>
  <text x="500" y="290" text-anchor="middle" class="small">Изоляция рабочих зон</text>

  <!-- Zone: Integration -->
  <rect x="670" y="80" width="300" height="240" rx="12" class="zone storage"/>
  <text x="690" y="105" class="small" style="fill:#0f766e;font-weight:600;">🟢 ИНТЕГРАЦИЯ</text>

  <!-- Qwen migration -->
  <rect x="700" y="120" width="240" height="50" rx="6" class="node storage"/>
  <text x="820" y="142" text-anchor="middle" class="label">Qwen → OpenClaw</text>
  <text x="820" y="160" text-anchor="middle" class="small">hooks → skills + cron</text>

  <!-- agentToAgent -->
  <rect x="700" y="185" width="240" height="50" rx="6" class="node storage"/>
  <text x="820" y="207" text-anchor="middle" class="label">agentToAgent</text>
  <text x="820" y="225" text-anchor="middle" class="small">enabled=true отсутствует</text>

  <!-- Context API -->
  <rect x="700" y="250" width="240" height="50" rx="6" class="node storage"/>
  <text x="820" y="272" text-anchor="middle" class="label">Context API</text>
  <text x="820" y="290" text-anchor="middle" class="small">bge-m3, 335 записей</text>

  <!-- Zone: Process -->
  <rect x="30" y="350" width="460" height="240" rx="12" class="zone external"/>
  <text x="50" y="375" class="small" style="fill:#92400e;font-weight:600;">🟡 ПРОЦЕССЫ</text>

  <!-- Telegram -->
  <rect x="60" y="395" width="190" height="50" rx="6" class="node external"/>
  <text x="155" y="417" text-anchor="middle" class="label">Telegram</text>
  <text x="155" y="435" text-anchor="middle" class="small">Без таблиц, списки</text>

  <!-- frontmatter -->
  <rect x="270" y="395" width="190" height="50" rx="6" class="node external"/>
  <text x="365" y="417" text-anchor="middle" class="label">Frontmatter</text>
  <text x="365" y="435" text-anchor="middle" class="small">93 артефакта, 0 ошибок</text>

  <!-- artifact-pulse -->
  <rect x="60" y="460" width="400" height="50" rx="6" class="node external"/>
  <text x="260" y="482" text-anchor="middle" class="label">artifact-pulse health-check</text>
  <text x="260" y="500" text-anchor="middle" class="small">Автоматизация: score &lt; 80 → инцидент</text>

  <!-- Инсайты -->
  <rect x="60" y="525" width="400" height="44" rx="6" class="node external"/>
  <text x="260" y="545" text-anchor="middle" class="small">Система инсайтов: SQLite + FAISS + семантический дедуп</text>
  <text x="260" y="560" text-anchor="middle" class="small">235 уникальных → 8 реальных тем</text>

  <!-- Zone: Data -->
  <rect x="520" y="350" width="450" height="240" rx="12" class="zone input"/>
  <text x="540" y="375" class="small" style="fill:#1d4ed8;font-weight:600;">🔵 ДАННЫЕ</text>

  <!-- agent-registry -->
  <rect x="550" y="395" width="190" height="50" rx="6" class="node input"/>
  <text x="645" y="417" text-anchor="middle" class="label">agent-registry</text>
  <text x="645" y="435" text-anchor="middle" class="small">openclaw.json = source of truth</text>

  <!-- monorepo -->
  <rect x="760" y="395" width="180" height="50" rx="6" class="node input"/>
  <text x="850" y="417" text-anchor="middle" class="label">Monorepo</text>
  <text x="850" y="435" text-anchor="middle" class="small">projects vs workspaces</text>

  <!-- Insights flow -->
  <rect x="550" y="460" width="390" height="50" rx="6" class="node input"/>
  <text x="745" y="482" text-anchor="middle" class="label">Конвейер инсайтов</text>
  <text x="745" y="500" text-anchor="middle" class="small">new → verified → artifact → ADR/PAT</text>

  <!-- Stats -->
  <rect x="550" y="525" width="390" height="44" rx="6" class="node input"/>
  <text x="745" y="545" text-anchor="middle" class="small">6 ADR + 2 PAT оформлены · 167+33 тестов зелёных</text>
  <text x="745" y="560" text-anchor="middle" class="small">Фронтенд деплоен · Myrmex 200 OK</text>

  <!-- Edges -->
  <path d="M300 150 L380 145" class="edge" marker-end="url(#arr)"/>
  <path d="M300 220 L380 210" class="edge" marker-end="url(#arr)"/>
  <path d="M640 210 L700 210" class="edge" marker-end="url(#arr)"/>
  <path d="M500 270 L500 395" class="edge" marker-end="url(#arr)"/>
  <path d="M460 485 L550 485" class="edge" marker-end="url(#arr)"/>
  <path d="M745 510 L745 525" class="edge" marker-end="url(#arr)"/>

  <!-- Legend -->
  <rect x="30" y="595" width="940" height="1" style="fill:var(--line);"/>
  <text x="500" y="610" text-anchor="middle"="middle" class="small">🔴 Критично · 🔵 Архитектура/Данные · 🟢 Интеграция · 🟡 Процессы</text>
</svg>
</main>

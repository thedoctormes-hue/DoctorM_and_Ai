name: Lab Playwright Expert — CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'projects/lab-playwright-expert/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'projects/lab-playwright-expert/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ===== 1. Lint + Syntax =====
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: projects/lab-playwright-expert/requirements.txt

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Python syntax check
        working-directory: projects/lab-playwright-expert
        run: |
          python -m py_compile $(find src/ scripts/ -name "*.py" | tr '\n' ' ')
          echo "✅ All files compile OK"

      - name: Ruff lint
        working-directory: projects/lab-playwright-expert
        run: ruff check src/ scripts/ tests/ --output-format=github

  # ===== 2. Unit + Integration Tests =====
  test:
    name: Tests — pytest + Playwright
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: projects/lab-playwright-expert/requirements.txt

      - name: Install dependencies
        working-directory: projects/lab-playwright-expert
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Install Playwright browsers
        working-directory: projects/lab-playwright-expert
        run: playwright install --with-deps chromium

      - name: Run tests
        working-directory: projects/lab-playwright-expert
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --cov=src/lab_playwright_kit \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            2>&1 | tail -50

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: projects/lab-playwright-expert/.coverage
          retention-days: 7

  # ===== 3. Screenshot Service Health Check =====
  healthcheck:
    name: Screenshot Service — Health Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: projects/lab-playwright-expert
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Start screenshot service
        working-directory: projects/lab-playwright-expert/scripts
        run: |
          pip install fastapi uvicorn
          python3 -c "
          import sys
          sys.path.insert(0, '../src')
          from screenshot_service import app
          import uvicorn
          uvicorn.run(app, host='127.0.0.1', port=8190, log_level='warning')
          " &
          sleep 3

      - name: Health check
        run: |
          curl -sf http://127.0.0.1:8190/health | python3 -m json.tool
          echo "✅ Service is healthy"

      - name: Test screenshot endpoint
        run: |
          curl -sf -X POST http://127.0.0.1:8190/screenshot \
            -H "Content-Type: application/json" \
            -d '{"url": "https://example.com", "full_page": false}' \
            | python3 -m json.tool
          echo "✅ Screenshot endpoint works"

  # ===== 4. Docker Build =====
  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        working-directory: projects/lab-playwright-expert
        run: |
          docker build -t lab-playwright-expert:${{ github.sha }} .
          docker images | grep lab-playwright

      - name: Test Docker container
        run: |
          docker run -d --name test-screenshot \
            -p 8191:8190 \
            lab-playwright-expert:${{ github.sha }}
          sleep 5
          curl -sf http://127.0.0.1:8191/health || (docker logs test-screenshot && exit 1)
          echo "✅ Docker container healthy"
          docker stop test-screenshot
          docker rm test-screenshot

  # ===== 5. Deploy to Production =====
  deploy:
    name: Deploy → Production
    needs: [healthcheck, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "=== Deploying Lab Playwright Expert ==="

            cd /root/LabDoctorM
            git pull origin main

            # Update Python deps
            cd /root/LabDoctorM/projects/lab-playwright-expert
            source .venv/bin/activate
            pip install -r requirements.txt --quiet

            # Restart service
            systemctl restart screenshot-service
            sleep 3

            # Health check
            curl -sf http://localhost:8190/health || {
              echo "❌ Health check failed!"
              journalctl -u screenshot-service --no-pager -n 20
              exit 1
            }

            echo "✅ Screenshot service deployed and healthy"

            # Run smoke tests
            curl -sf -X POST http://localhost:8190/screenshot \
              -H "Content-Type: application/json" \
              -d '{"url": "https://example.com"}' | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            assert d['success'], f'Screenshot failed: {d}'
            print(f'✅ Smoke test OK: {d[\"load_time_ms\"]:.0f}ms')
            "

            echo "=== Deploy complete ==="

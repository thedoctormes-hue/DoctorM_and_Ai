name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check for large files
        run: |
          big=$(git ls-files | xargs ls -la 2>/dev/null | awk '$5 > 5242880 {print $0}')
          if [ -n "$big" ]; then
            echo "❌ Files larger than 5MB found:"
            echo "$big"
            exit 1
          fi
          echo "No large files found"
      - name: Python syntax check
        run: python3 -m py_compile $(find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*" | head -10) || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check for secrets in code
        run: |
          git diff --cached --name-only --diff-filter=ACM | xargs grep -l 'TOKEN\|SECRET\|PASSWORD\|API_KEY' 2>/dev/null || echo "No secrets detected"
      - name: Check for private keys
        run: |
          find . -name "*.pem" -o -name "*.key" -not -path "./venv/*" -not -path "./.venv/*" | head -5 || echo "No private keys found"

name: artifact-pulse CI

on:
  push:
    paths:
      - 'projects/artifact-pulse/**'
  pull_request:
    paths:
      - 'projects/artifact-pulse/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest ruff mypy
          cd projects/artifact-pulse && pip install .
      - name: Lint (ruff)
        run: cd projects/artifact-pulse && ruff check .
      - name: Type check (mypy)
        run: cd projects/artifact-pulse && mypy . || true
      - name: Test (pytest)
        run: cd projects/artifact-pulse && python -m pytest tests/ -q
